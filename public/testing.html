<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatchFire | Testing — Match & Feedback</title>
    <style>
        :root {
            --bg: #0c0c0c;
            --card: #1a1a1a;
            --border: rgba(255,255,255,0.1);
            --gold: #c9a227;
            --text: #fafafa;
            --muted: #888;
            --green: #10b981;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; max-width: 800px; }
        label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
        textarea { width: 100%; min-height: 100px; padding: 12px; background: #111; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; resize: vertical; }
        button { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .feedback-btns { display: inline-flex; gap: 8px; margin-top: 12px; }
        .feedback-btns button { padding: 8px 16px; font-size: 1.2rem; background: transparent; border: 1px solid var(--border); color: var(--text); }
        .feedback-btns button:hover { background: rgba(255,255,255,0.05); }
        .feedback-btns .up:hover { border-color: var(--green); color: var(--green); }
        .feedback-btns .down:hover { border-color: var(--red); color: var(--red); }
        .result { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); gap: 12px; }
        .result:last-child { border-bottom: none; }
        .result-info { flex: 1; min-width: 0; }
        .result-name { font-weight: 600; }
        .result-meta { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
        .result-reasons { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
        .result-score { flex-shrink: 0; text-align: right; }
        .result-score-num { font-size: 1.25rem; color: var(--gold); }
        .result-feedback { flex-shrink: 0; }
        .loading { color: var(--muted); padding: 20px; }
        .error { color: var(--red); padding: 12px; }
        .response-feedback { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .response-feedback label { margin-bottom: 8px; }
        .comment-area { margin-top: 12px; }
        .comment-area textarea { min-height: 60px; font-size: 13px; }
        .feedback-btns button.active-up { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green); }
        .feedback-btns button.active-down { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
        .feedback-sent { font-size: 0.8rem; color: var(--green); margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
        .feedback-sent.show { opacity: 1; }
        .links { margin-top: 24px; font-size: 0.9rem; }
        .links a { color: var(--gold); text-decoration: none; margin-right: 16px; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="links" style="margin-bottom: 16px;">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/app/creators">Browse Creators</a>
    </nav>
    <h1>🧪 CatchFire Testing — Match & Feedback</h1>
    <p class="sub">Paste a client brief, get ranked creators, then give 👍/👎. Feedback is sent to the monitored sheet when configured.</p>

    <div class="card">
        <label for="brief">Client brief</label>
        <textarea id="brief" placeholder="e.g. Need a cinematographer for a moody fashion film, ARRI experience, NYC or LA."></textarea>
        <div style="margin-top: 12px;">
            <button type="button" class="btn-primary" id="matchBtn">Match creators</button>
        </div>
    </div>

    <div class="card" id="resultsCard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <strong>Results</strong>
            <span id="matchCount"></span>
        </div>
        <div id="resultsList"></div>
        <div class="response-feedback">
            <label>Rate this response overall</label>
            <div class="feedback-btns">
                <button type="button" class="up" id="responseUp" title="Thumbs up">👍</button>
                <button type="button" class="down" id="responseDown" title="Thumbs down">👎</button>
                <span class="feedback-sent" id="responseFeedbackSent">Recorded</span>
            </div>
            <div class="comment-area">
                <label for="responseComment">Notes (optional)</label>
                <textarea id="responseComment" placeholder="Any thoughts on these results? What would you expect instead?"></textarea>
            </div>
        </div>
    </div>

    <div class="card" id="loadingCard" style="display: none;">
        <div class="loading">Matching…</div>
    </div>
    <div class="card" id="errorCard" style="display: none;">
        <div class="error" id="errorText"></div>
    </div>

    <div class="links">
        <a href="/">Control Center</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/health" target="_blank">Health</a>
        <a href="/api/v1/creators" target="_blank">Creators API</a>
    </div>

    <script>
        const briefEl = document.getElementById('brief');
        const matchBtn = document.getElementById('matchBtn');
        const resultsCard = document.getElementById('resultsCard');
        const resultsList = document.getElementById('resultsList');
        const matchCountEl = document.getElementById('matchCount');
        const loadingCard = document.getElementById('loadingCard');
        const errorCard = document.getElementById('errorCard');
        const errorText = document.getElementById('errorText');
        const responseUp = document.getElementById('responseUp');
        const responseDown = document.getElementById('responseDown');

        const base = window.location.origin;
        let lastMatchPayload = null;
        let sessionId = 'session-' + Date.now();

        function showLoading(show) {
            loadingCard.style.display = show ? 'block' : 'none';
            errorCard.style.display = 'none';
            if (!show) resultsCard.style.display = lastMatchPayload ? 'block' : 'none';
        }
        function showError(msg) {
            errorText.textContent = msg;
            errorCard.style.display = 'block';
            resultsCard.style.display = 'none';
        }

        const responseComment = document.getElementById('responseComment');
        const responseFeedbackSent = document.getElementById('responseFeedbackSent');

        async function sendFeedback(rating, creatorId, resultId, btn) {
            const comment = (!creatorId && responseComment) ? responseComment.value.trim() : '';
            const body = {
                event: 'match',
                briefOrQuery: lastMatchPayload ? lastMatchPayload.brief : briefEl.value.slice(0, 500),
                sessionId,
                rating,
                resultId: resultId || '',
                creatorId: creatorId || '',
                comment
            };
            try {
                const r = await fetch(base + '/api/v1/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await r.json();
                if (data.success && btn) {
                    btn.classList.add(rating === 'up' ? 'active-up' : 'active-down');
                    if (!creatorId) {
                        responseFeedbackSent.classList.add('show');
                        setTimeout(() => responseFeedbackSent.classList.remove('show'), 2000);
                    }
                }
                return data.success;
            } catch (e) {}
            return false;
        }

        matchBtn.addEventListener('click', async () => {
            const brief = briefEl.value.trim();
            if (!brief) return;
            showLoading(true);
            resultsCard.style.display = 'none';
            errorCard.style.display = 'none';
            matchBtn.disabled = true;
            try {
                const res = await fetch(base + '/api/v1/match', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ brief, filters: { limit: 10 } })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || res.statusText);
                lastMatchPayload = { brief, matches: data.matches };
                matchCountEl.textContent = data.matchCount + ' creator(s)';
                resultsList.innerHTML = (data.matches || []).map((m, i) => {
                    const reasons = (m.matchReasons || []).slice(0, 3).join(' · ');
                    return '<div class="result" data-creator-id="' + (m.id || '') + '" data-result-id="result-' + i + '">' +
                        '<div class="result-info">' +
                        '<div class="result-name">' + (m.name || 'Unknown') + '</div>' +
                        '<div class="result-meta">' + (m.craft?.primary || '') + (m.contact?.location ? ' · ' + m.contact.location : '') + '</div>' +
                        (reasons ? '<div class="result-reasons">' + reasons + '</div>' : '') +
                        '</div>' +
                        '<div class="result-score"><div class="result-score-num">' + (m.matchScore ?? '—') + '</div><div>score</div></div>' +
                        '<div class="result-feedback">' +
                        '<button type="button" class="up" title="Good match">👍</button> ' +
                        '<button type="button" class="down" title="Poor match">👎</button>' +
                        '</div></div>';
                }).join('');
                resultsCard.style.display = 'block';
                resultsList.querySelectorAll('.result').forEach(row => {
                    const creatorId = row.dataset.creatorId;
                    const resultId = row.dataset.resultId;
                    const upBtn = row.querySelector('.up');
                    const downBtn = row.querySelector('.down');
                    upBtn.addEventListener('click', () => sendFeedback('up', creatorId, resultId, upBtn));
                    downBtn.addEventListener('click', () => sendFeedback('down', creatorId, resultId, downBtn));
                });
            } catch (e) {
                showError(e.message || 'Match request failed');
            }
            showLoading(false);
            matchBtn.disabled = false;
        });

        responseUp.addEventListener('click', () => sendFeedback('up', '', '', responseUp));
        responseDown.addEventListener('click', () => sendFeedback('down', '', '', responseDown));
    </script>
</body>
</html>
